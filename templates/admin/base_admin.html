<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Admin{% endblock %} — Archive Manila</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --black: #0a0a0a;
  --white: #f5f4f0;
  --cream: #f0ede6;
  --accent: #c8102e;
  --gray: #888;
  --light-gray: #e8e5df;
  --border: #d8d4cc;
  --sidebar-w: 240px;
  --font-display: 'Barlow Condensed', sans-serif;
  --font-body: 'Barlow', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-body); background: var(--cream); color: var(--black); display: flex; min-height: 100vh; }
a { color: inherit; text-decoration: none; }

.sidebar {
  width: var(--sidebar-w); background: var(--black);
  display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; bottom: 0; z-index: 50;
}
.sidebar-logo {
  padding: 1.5rem;
  font-family: var(--font-display); font-size: 1.2rem;
  font-weight: 900; text-transform: uppercase;
  letter-spacing: 0.05em; color: white;
  border-bottom: 1px solid #222;
  line-height: 1.2;
}
.sidebar-logo span { display: block; font-size: 0.65rem; font-weight: 400; color: #555; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 0.2rem; }

.sidebar-nav { flex: 1; padding: 1rem 0; overflow-y: auto; }
.nav-item {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 0.7rem 1.5rem;
  color: #666; font-size: 0.85rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.07em;
  transition: all 0.2s; cursor: pointer;
  border-left: 3px solid transparent;
}
.nav-item:hover { color: white; background: #111; }
.nav-item.active { color: white; background: #111; border-left-color: var(--accent); }
.nav-item-icon { font-size: 1rem; width: 20px; text-align: center; }

.nav-notification-dot {
  width: 8px; height: 8px; background: var(--accent);
  border-radius: 50%; margin-left: auto;
  animation: blink 1s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

.notification-badge {
  background: var(--accent); color: white;
  font-size: 0.65rem; font-weight: 700;
  padding: 0.15rem 0.45rem; border-radius: 10px;
  margin-left: auto; line-height: 1.4;
}

.sidebar-bottom {
  padding: 1rem 1.5rem;
  border-top: 1px solid #222;
}
.logout-btn {
  color: #555; font-size: 0.78rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.08em;
  transition: color 0.2s;
}
.logout-btn:hover { color: var(--accent); }

.main-content {
  margin-left: var(--sidebar-w);
  flex: 1; display: flex; flex-direction: column; min-height: 100vh;
}
.topbar {
  background: white; border-bottom: 1px solid var(--border);
  padding: 1rem 2rem;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 40;
}
.topbar-title {
  font-family: var(--font-display); font-size: 1.5rem;
  font-weight: 900; text-transform: uppercase; letter-spacing: 0.05em;
}
.admin-user { font-size: 0.8rem; color: var(--gray); }

/* Notification Bell */
.notif-bell { position: relative; cursor: pointer; }
.notif-bell-icon { font-size: 1.3rem; }
.notif-count {
  position: absolute; top: -5px; right: -5px;
  background: var(--accent); color: white;
  font-size: 0.6rem; font-weight: 700;
  width: 16px; height: 16px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  display: none;
}
.notif-panel {
  position: absolute; top: 100%; right: 0;
  width: 320px; background: white;
  border: 1px solid var(--border);
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  z-index: 100; display: none; max-height: 400px; overflow-y: auto;
}
.notif-panel.open { display: block; }
.notif-panel-header {
  padding: 0.75rem 1rem; border-bottom: 1px solid var(--border);
  font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
  display: flex; justify-content: space-between;
}
.notif-item {
  padding: 0.75rem 1rem; border-bottom: 1px solid var(--border);
  font-size: 0.82rem; cursor: pointer; transition: background 0.2s;
}
.notif-item:hover { background: var(--cream); }
.notif-item-title { font-weight: 700; margin-bottom: 0.2rem; }
.notif-item-sub { color: var(--gray); font-size: 0.75rem; }
.notif-empty { padding: 1.5rem; text-align: center; color: var(--gray); font-size: 0.85rem; }

/* Toast */
.toast-container { position: fixed; top: 1rem; right: 1rem; z-index: 999; display: flex; flex-direction: column; gap: 0.5rem; }
.toast {
  background: var(--black); color: white; padding: 0.75rem 1.25rem;
  font-size: 0.82rem; border-left: 3px solid var(--accent);
  animation: slideIn 0.3s ease, fadeOut 0.3s ease 3.7s forwards;
  min-width: 250px;
}
.toast.success { border-left-color: #2d7a2d; }
.toast.error { border-left-color: var(--accent); }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes fadeOut { to { opacity: 0; transform: translateX(20px); } }

.page-body { padding: 2rem; flex: 1; }

/* Status badges */
.badge {
  display: inline-block; padding: 0.25rem 0.65rem;
  font-size: 0.72rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.07em;
  white-space: nowrap;
}
.badge-pending { background: #fff3cd; color: #856404; }
.badge-verified { background: #d1ecf1; color: #0c5460; }
.badge-rejected { background: #f8d7da; color: #721c24; }
.badge-preparing { background: #d4edda; color: #155724; }
.badge-shipped { background: #cce5ff; color: #004085; }
.badge-completed { background: var(--black); color: white; }

/* Cards */
.stat-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 1rem; margin-bottom: 2rem;
}
.stat-card { background: white; border: 1px solid var(--border); padding: 1.25rem; }
.stat-card-label {
  font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--gray); margin-bottom: 0.4rem;
}
.stat-card-value {
  font-family: var(--font-display); font-size: 2rem;
  font-weight: 900; line-height: 1;
}

/* Table */
.data-table { width: 100%; border-collapse: collapse; background: white; }
.data-table th {
  text-align: left; padding: 0.75rem 1rem;
  font-size: 0.72rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.1em;
  border-bottom: 2px solid var(--black); background: var(--cream);
  white-space: nowrap;
}
.data-table td {
  padding: 0.75rem 1rem; border-bottom: 1px solid var(--border);
  font-size: 0.85rem; vertical-align: middle;
}
.data-table tr:hover td { background: var(--cream); }
.data-table tr:last-child td { border-bottom: none; }

.table-wrapper { border: 1px solid var(--border); overflow-x: auto; }

/* Buttons */
.btn {
  display: inline-block; padding: 0.6rem 1.2rem;
  font-family: var(--font-display); font-weight: 700;
  font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.08em;
  border: 2px solid var(--black); cursor: pointer;
  transition: all 0.2s; text-align: center; line-height: 1;
  background: none;
}
.btn-primary { background: var(--black); color: white; }
.btn-primary:hover { background: #333; }
.btn-sm { padding: 0.35rem 0.75rem; font-size: 0.75rem; }
.btn-accent { background: var(--accent); color: white; border-color: var(--accent); }
.btn-accent:hover { background: #a80d26; }
.btn-success { background: #2d7a2d; color: white; border-color: #2d7a2d; }
.btn-success:hover { background: #1e5a1e; }
.btn-danger { background: #c0392b; color: white; border-color: #c0392b; }
.btn-danger:hover { background: #922b21; }
.btn-outline { background: transparent; }
.btn-outline:hover { background: var(--black); color: white; }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: white; width: min(600px, 95vw);
  max-height: 90vh; overflow-y: auto;
  transform: scale(0.95); transition: transform 0.2s;
}
.modal-overlay.open .modal { transform: scale(1); }
.modal-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 1.25rem 1.5rem; border-bottom: 2px solid var(--black);
}
.modal-title {
  font-family: var(--font-display); font-size: 1.3rem;
  font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em;
}
.modal-body { padding: 1.5rem; }
.modal-footer {
  padding: 1rem 1.5rem; border-top: 1px solid var(--border);
  display: flex; gap: 0.75rem; justify-content: flex-end;
}
.close-modal { background: none; border: none; font-size: 1.4rem; cursor: pointer; line-height: 1; }

.form-group { margin-bottom: 1.1rem; }
.form-group label {
  display: block; font-size: 0.75rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 0.35rem;
}
.form-group input, .form-group textarea, .form-group select {
  width: 100%; padding: 0.65rem 0.9rem;
  border: 1px solid var(--border); background: var(--cream);
  font-family: var(--font-body); font-size: 0.88rem; outline: none;
  transition: border-color 0.2s; -webkit-appearance: none;
}
.form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--black); }
.form-group textarea { height: 80px; resize: vertical; }
.form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

/* Filter bar */
.filter-bar {
  display: flex; gap: 0.75rem; flex-wrap: wrap;
  margin-bottom: 1.5rem; align-items: center;
}
.filter-btn {
  padding: 0.35rem 0.9rem; border: 1px solid var(--border);
  font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.07em; cursor: pointer; background: white;
  transition: all 0.2s; font-family: var(--font-body);
}
.filter-btn:hover, .filter-btn.active { background: var(--black); color: white; border-color: var(--black); }

/* Product image preview */
.product-thumb {
  width: 44px; height: 44px; object-fit: cover;
  background: var(--light-gray); border: 1px solid var(--border);
}
.product-thumb-placeholder { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; background: var(--light-gray); font-size: 1.3rem; }
</style>
{% block extra_styles %}{% endblock %}
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <span>Admin Panel</span>
    Archive Manila
  </div>
  <nav class="sidebar-nav">
    <a href="/admin/dashboard" class="nav-item {% if request.endpoint == 'admin_dashboard' %}active{% endif %}">
      <span class="nav-item-icon">📊</span> Dashboard
    </a>
    <a href="/admin/orders" class="nav-item {% if request.endpoint in ('admin_orders', 'admin_order_detail') %}active{% endif %}">
      <span class="nav-item-icon">📦</span> Orders
      <span class="notification-badge" id="pending-count" style="display:none">0</span>
    </a>
    <a href="/admin/products" class="nav-item {% if request.endpoint == 'admin_products' %}active{% endif %}">
      <span class="nav-item-icon">👕</span> Products
    </a>
    <a href="/" target="_blank" class="nav-item">
      <span class="nav-item-icon">🛍️</span> View Store
    </a>
  </nav>
  <div class="sidebar-bottom">
    <a href="/admin/logout" class="logout-btn">← Logout</a>
  </div>
</aside>

<div class="main-content">
  <div class="topbar">
    <div class="topbar-title">{% block page_title %}Dashboard{% endblock %}</div>
    <div style="display:flex;align-items:center;gap:1.5rem">
      <div class="notif-bell" onclick="toggleNotifPanel()">
        <span class="notif-bell-icon">🔔</span>
        <span class="notif-count" id="notif-count">0</span>
        <div class="notif-panel" id="notif-panel">
          <div class="notif-panel-header">
            <span>Notifications</span>
            <span style="cursor:pointer;color:var(--gray);font-size:0.7rem" onclick="clearNotifications(event)">Clear all</span>
          </div>
          <div id="notif-list"><div class="notif-empty">No new notifications</div></div>
        </div>
      </div>
      <div class="admin-user">👤 Admin</div>
    </div>
  </div>
  <div class="page-body">
    {% block content %}{% endblock %}
  </div>
</div>

<div class="toast-container" id="admin-toast-container"></div>

<script>
let notifications = JSON.parse(localStorage.getItem('admin_notifications') || '[]');

function showAdminToast(msg, type = '') {
  const tc = document.getElementById('admin-toast-container');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  tc.appendChild(t);
  setTimeout(() => t.remove(), 4100);
}

function toggleNotifPanel() {
  document.getElementById('notif-panel').classList.toggle('open');
}
document.addEventListener('click', e => {
  if (!e.target.closest('.notif-bell')) document.getElementById('notif-panel').classList.remove('open');
});

function addNotification(notif) {
  notifications.unshift(notif);
  if (notifications.length > 30) notifications.pop();
  localStorage.setItem('admin_notifications', JSON.stringify(notifications));
  renderNotifications();
}

function renderNotifications() {
  const list = document.getElementById('notif-list');
  const count = document.getElementById('notif-count');
  if (notifications.length === 0) {
    list.innerHTML = '<div class="notif-empty">No new notifications</div>';
    count.style.display = 'none';
    return;
  }
  count.textContent = Math.min(notifications.length, 99);
  count.style.display = 'flex';
  list.innerHTML = notifications.slice(0, 15).map(n => `
    <div class="notif-item" onclick="window.location='/admin/orders'">
      <div class="notif-item-title">🔔 ${n.title}</div>
      <div class="notif-item-sub">${n.sub} · ${formatRelTime(n.ts)}</div>
    </div>`).join('');

  // Update pending count badge
  const pc = document.getElementById('pending-count');
  const pending = notifications.filter(n => n.type === 'new_order').length;
  if (pending > 0) { pc.textContent = pending; pc.style.display = 'inline-block'; }
}

function clearNotifications(e) {
  e.stopPropagation();
  notifications = [];
  localStorage.setItem('admin_notifications', JSON.stringify(notifications));
  renderNotifications();
}

function formatRelTime(ts) {
  const diff = (Date.now() - new Date(ts)) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}

// Admin notifications — polling every 8s (reliable, no thread-blocking)
let lastNotifCheck = Date.now();
let pollTimer = null;

async function pollNotifications() {
  try {
    const res = await fetch('/api/admin-poll-notifications', {
      credentials: 'same-origin'
    });
    if (res.status === 401) return; // not logged in, stop polling
    if (res.ok) {
      const data = await res.json();
      lastNotifCheck = data.timestamp || Date.now();
      (data.events || []).forEach(event => {
        if (event.type === 'new_order') {
          addNotification({
            type: 'new_order',
            title: 'New Order Pending Verification',
            sub: `${event.order_number} · ${event.buyer_name} · ₱${Math.round(event.total)}`,
            ts: event.timestamp
          });
          showAdminToast(`🆕 New order: ${event.order_number}`, 'success');
          {% if request.endpoint == 'admin_dashboard' %}
          setTimeout(() => location.reload(), 1500);
          {% endif %}
        } else if (event.type === 'status_update') {
          showAdminToast(`📦 Order ${event.order_number} → ${event.new_status}`);
        }
      });
    }
  } catch(e) { /* network error, will retry */ }
  pollTimer = setTimeout(pollNotifications, 8000);
}

// Start polling after page fully loads
setTimeout(pollNotifications, 2000);

renderNotifications();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
