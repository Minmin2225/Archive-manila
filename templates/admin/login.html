<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Archive Manila</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --black: #0a0a0a; --white: #f5f4f0; --cream: #f0ede6; --accent: #c8102e;
  --border: #d8d4cc; --font-display: 'Barlow Condensed', sans-serif; --font-body: 'Barlow', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-body);background:var(--black);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.login-card{background:var(--cream);width:min(400px,95vw);padding:3rem;}
.login-logo{font-family:var(--font-display);font-size:2rem;font-weight:900;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.3rem;line-height:1;}
.login-sub{font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:0.15em;color:#888;margin-bottom:2rem;}
.form-group{margin-bottom:1.2rem;}
.form-group label{display:block;font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.4rem;}
.form-group input{width:100%;padding:0.75rem 1rem;border:1px solid var(--border);background:white;font-family:var(--font-body);font-size:0.9rem;outline:none;transition:border-color 0.2s;}
.form-group input:focus{border-color:var(--black);}
.btn{width:100%;padding:0.9rem;background:var(--black);color:white;border:none;font-family:var(--font-display);font-size:1rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;cursor:pointer;transition:background 0.2s;margin-top:0.5rem;}
.btn:hover{background:#222;}
.error-msg{background:#f8d7da;color:#721c24;border:1px solid #f5c6cb;padding:0.65rem 0.9rem;font-size:0.82rem;margin-bottom:1rem;}
</style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">Archive Manila</div>
  <div class="login-sub">Admin Panel</div>
  {% if error %}
  <div class="error-msg">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" required autofocus>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" required>
    </div>
    <button class="btn" type="submit">Sign In</button>
  </form>
</div>
</body>
</html>
